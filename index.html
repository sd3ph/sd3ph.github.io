<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>iLab - Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Open+Sans:wght@300;400;600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header class="main-header">
        <div class="site-title-header">
            <div class="title">Physics+Arts+AI</div>
        </div>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="#highlight" data-page="pages/highlight.html" class="nav-link active">Home</a></li>
                <li><a href="#research" data-page="pages/research.html" class="nav-link">Research</a></li>
                <li><a href="#publication" data-page="pages/publication.html" class="nav-link">Publication</a></li>
                <li><a href="#teaching" data-page="pages/teaching.html" class="nav-link">Teaching</a></li>
                <li><a href="#about" data-page="pages/about.html" class="nav-link">About</a></li>
                <li><a href="#outreach" data-page="pages/outreach.html" class="nav-link">Outreach</a></li>
                <li><a href="#latest" data-page="pages/latest.html" class="nav-link">Latest</a></li>
                <li><a href="#classroom" data-page="pages/classroom.html" class="nav-link">Live Class Room</a></li>
                <li><a href="#products" data-page="pages/products.html" class="nav-link">Lab Products</a></li>
                <li><a href="#misc" data-page="pages/misc.html" class="nav-link">misc</a></li>
                <li><a href="#playground" data-page="pages/playground.html" class="nav-link">Playground</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-wrapper container">
        <iframe id="content-frame" class="content-frame" src="pages/highlight.html" title="content"></iframe>
    </main>

    <script>
        (function(){
            const links = document.querySelectorAll('.nav-link');
            const iframe = document.getElementById('content-frame');
            const pageMap = {};
            links.forEach(a => pageMap[a.getAttribute('href').replace('#','')] = a.getAttribute('data-page'));

            function setActive(hash) {
                links.forEach(l => l.classList.remove('active'));
                const target = Array.from(links).find(l => l.getAttribute('href') === '#'+hash);
                if(target) target.classList.add('active');
            }

            function navigate(hash, push=true) {
                const key = (hash||'highlight').replace('#','');
                const page = pageMap[key] || 'pages/highlight.html';
                iframe.src = page;
                setActive(key);
                if(push) history.pushState({page:key}, '', '#'+key);
            }

            links.forEach(l => l.addEventListener('click', function(e){
                e.preventDefault();
                const h = this.getAttribute('href').replace('#','');
                navigate(h);
            }));

            window.addEventListener('popstate', function(e){
                const h = location.hash ? location.hash.replace('#','') : 'highlight';
                navigate(h, false);
            });

            // initial
            const start = location.hash ? location.hash.replace('#','') : 'highlight';
            navigate(start, false);
        })();
    </script>
</body>
</html>
